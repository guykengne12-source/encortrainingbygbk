<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Training CCNP ENCOR Exam By Guy B KENGNE </title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
.option { background:#334155; padding:10px; margin:10px; border-radius:8px; cursor:grab;}
.correct { background:#16a34a !important;}
.wrong { background:#dc2626 !important;}
.topbar { display:flex; justify-content:space-between; }
#timer { color:#facc15; }
</style>
</head>

<body>

<h2>Training CCNP ENCOR Exam By Guy B KENGNE</h2>

<input id="username" placeholder="Nom">
<button onclick="startExam()">Commencer</button>

<div id="exam"></div>

<script>

const API = "https://encor-training-by-gbk.onrender.com";

let current = 0;
let score = 0;
let total = 0;

let answers = {};
let timer;
let timeLeft = 60 * 30; // 30 min EXAM GLOBAL

/* LOAD TOTAL */
async function getCount(){
  let res = await fetch(API + "/api/count");
  let data = await res.json();
  total = data.count;
}

/* TIMER GLOBAL */
function startGlobalTimer(){
  timer = setInterval(()=>{
    timeLeft--;

    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;

    document.getElementById("timer").innerText =
      `Temps restant: ${min}:${sec < 10 ? "0"+sec : sec}`;

    if(timeLeft <= 0){
      clearInterval(timer);
      finishExam();
    }
  },1000);
}

/* LOAD QUESTION */
async function loadQuestion(){

  let res = await fetch(API + "/api/question/" + current);
  let q = await res.json();

  let html = `
    <div class="topbar">
      <div>Question ${current+1}/${total}</div>
      <div id="timer"></div>
    </div>

    <p>${q.question}</p>
  `;

  if(q.type === "drag"){

    html += `<div style="display:flex;gap:20px">`;

    html += `<div>`;
    q.items.forEach(i=>{
      html += `<div class="option" draggable="true" id="${i.id}">${i.text}</div>`;
    });
    html += `</div>`;

    html += `<div>`;
    q.zones.forEach(z=>{
      html += `<div class="option zone" data-zone="${z.text}">
        ${z.text}
      </div>`;
    });
    html += `</div>`;

    html += `</div>`;

  } else {

    q.options.forEach((opt,i)=>{
      let checked = answers[current] == i ? "checked" : "";
      html += `
        <div>
          <input type="radio" name="answer" value="${i}" ${checked}>
          ${opt}
        </div>
      `;
    });

  }

  html += `<br><button onclick="saveAnswer()">Valider</button>`;

  document.getElementById("exam").innerHTML = html;

  enableDrag();
}

/* SAVE ANSWER */
function saveAnswer(){

  let qType = document.querySelector(".zone") ? "drag" : "mcq";

  if(qType === "mcq"){

    let selected = document.querySelector("input[name=answer]:checked");

    if(selected){
      answers[current] = {
        type: "mcq",
        value: parseInt(selected.value)
      };
    }

  } else {

    let dragAnswers = {};

    document.querySelectorAll(".zone").forEach(z=>{
      let name = z.dataset.zone;
      dragAnswers[name] =
        Array.from(z.children).map(el=>el.id);
    });

    answers[current] = {
      type: "drag",
      value: dragAnswers
    };
  }

  localStorage.setItem("exam_answers", JSON.stringify(answers));

  nextQuestion();
}

/* NEXT */
function nextQuestion(){
  current++;

  if(current < total){
    loadQuestion();
  } else {
    finishExam();
  }
}

/* FIN EXAM */
async function finishExam(){
  clearInterval(timer);

  let res = await fetch(API + "/api/validate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      index: current,
      answers: answers
    })
  });

  document.getElementById("exam").innerHTML = `
    <h2>Examen terminé</h2>
    <p>Score: ${score}</p>
  `;

  localStorage.removeItem("exam_answers");
}

/* START */
async function startExam(){
  await getCount();

  let saved = localStorage.getItem("exam_answers");
  if(saved){
    answers = JSON.parse(saved);
  }

  startGlobalTimer();
  loadQuestion();
}

</script>

</body>
</html>
